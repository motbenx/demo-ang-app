<div class="page">
  <!-- Page Header -->
  <div class="page-header">
    <h1 class="page-title">Overview</h1>
  </div>

  <!-- KPI Cards Row -->
  <div class="kpi-grid">
    @for (card of kpiCards(); track card.label) {
      <div class="kpi-card">
        <div class="kpi-header">
          <div class="kpi-icon-wrap" [style.background]="card.color + '15'">
            <tui-icon [icon]="card.icon" class="kpi-icon" [style.color]="card.color" />
          </div>
          <div class="kpi-trend" [class.kpi-trend--positive]="card.trendPositive" [class.kpi-trend--negative]="!card.trendPositive">
            <tui-icon [icon]="card.trendPositive ? '@tui.trending-up' : '@tui.trending-down'" class="trend-icon" />
            <span class="trend-value">{{ card.trend }}</span>
          </div>
        </div>
        <div class="kpi-body">
          <div class="kpi-label">{{ card.label }}</div>
          <div class="kpi-value">{{ card.value }}</div>
        </div>
      </div>
    }
  </div>
</div>
