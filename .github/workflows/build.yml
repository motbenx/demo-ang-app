name: Build check

on:
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      # Use npm install so agents can add packages without manually updating lock file
      - run: npm install
      - run: npx ng build --configuration production
